openapi: 3.1.0
info:
  title: Operations Hub Audit Explorer API
  version: 1.0.0
servers:
  - url: /api/v1/banking
paths:
  /audit/logs/search:
    get:
      summary: Search audit trail
      security:
        - bearerAuth: []
      x-authorization-scopes:
        - audit:read
      parameters:
        - name: from
          in: query
          schema: { type: string, format: date-time }
        - name: to
          in: query
          schema: { type: string, format: date-time }
        - name: entity
          in: query
          schema: { type: string, minLength: 1, maxLength: 120 }
        - name: eventType
          in: query
          schema: { type: string, minLength: 1, maxLength: 120 }
      responses:
        '200':
          description: Matching logs
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      required: [id, action, actorId, resourceId, timestamp, details, status]
                      properties:
                        id: { type: string }
                        action: { type: string }
                        actorId: { type: string }
                        resourceId: { type: string }
                        timestamp: { type: string, format: date-time }
                        details: { type: object, additionalProperties: true }
                        status: { type: string, enum: [success, failure] }
              examples:
                items:
                  value:
                    items:
                      - id: log_01JZ5EB1
                        action: webhook.retry
                        actorId: svc_operations
                        resourceId: wh_0021
                        timestamp: 2026-03-18T10:01:00Z
                        details: { attempt: 3 }
                        status: success
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
  /audit/logs/export-signed:
    post:
      summary: Export signed audit logs
      security:
        - bearerAuth: []
      x-authorization-scopes:
        - audit:read
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                from: { type: string, format: date-time }
                to: { type: string, format: date-time }
                entity: { type: string }
                eventType: { type: string }
      responses:
        '200':
          description: Signed export metadata
          content:
            application/json:
              schema:
                type: object
                required: [exportId, signature]
                properties:
                  exportId: { type: string }
                  signature: { type: string, minLength: 16 }
                  downloadUrl: { type: string, format: uri }
              examples:
                exported:
                  value:
                    exportId: aexp_01JZ5EC3
                    signature: ed25519:d64ef3f1b34cc132eaaab7f4da139f72
                    downloadUrl: https://cdn.example.com/audit/aexp_01JZ5EC3.json
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    ErrorResponse:
      description: Error response
      content:
        application/json:
          schema:
            type: object
            required: [error]
            properties:
              error:
                type: object
                required: [code, message]
                properties:
                  code:
                    type: string
                    enum: [UNAUTHORIZED, FORBIDDEN, INVALID_FILTERS, INTERNAL_ERROR]
                  message: { type: string }
          examples:
            filters:
              value:
                error:
                  code: INVALID_FILTERS
                  message: from must be less than to
